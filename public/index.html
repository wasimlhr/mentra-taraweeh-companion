<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quran Companion</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #0b1220;
      color: #e8eefc;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 28rem;
      text-align: center;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { margin: 0.4rem 0; color: #a9b7d6; }
    .ok {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: #14301f;
      color: #8dffb0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Quran Companion</h1>
    <p>Running on MentraOS for G1 / G2.</p>
    <p>Recitation matching is active on your glasses. Settings are in the Mentra app.</p>
    <div class="ok">Server connected</div>
  </main>
</body>
</html>
